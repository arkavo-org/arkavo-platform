name: PIdP Release Image

on:
  push:
    branches:
      - main
    tags:
      - "pidp-v*"
    paths:
      - "PIdP/**"
      - ".github/workflows/pidp-release.yml"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Optional additional image tag (for example: rc1)"
        required: false
        type: string

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_ref: ${{ steps.out.outputs.image_ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare tags
        id: prep
        run: |
          IMAGE="ghcr.io/juliancoy/pidp"
          SHA_TAG="${IMAGE}:sha-${GITHUB_SHA::12}"
          LATEST_TAG="${IMAGE}:latest"
          TAGS="${SHA_TAG}"

          if [[ "${GITHUB_REF}" == refs/tags/pidp-v* ]]; then
            VERSION="${GITHUB_REF_NAME#pidp-v}"
            TAGS="${TAGS},${IMAGE}:${VERSION},${LATEST_TAG}"
          elif [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            TAGS="${TAGS},${LATEST_TAG}"
          fi

          if [[ -n "${{ github.event.inputs.image_tag }}" ]]; then
            TAGS="${TAGS},${IMAGE}:${{ github.event.inputs.image_tag }}"
          fi

          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: PIdP
          file: PIdP/Dockerfile
          push: true
          tags: ${{ steps.prep.outputs.tags }}
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set image reference output
        id: out
        run: |
          echo "image_ref=${{ steps.prep.outputs.image }}@${{ steps.build.outputs.digest }}" >> "$GITHUB_OUTPUT"

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: ${{ github.ref == 'refs/heads/main' && secrets.PIDP_DEPLOY_HOST != '' && secrets.PIDP_DEPLOY_USER != '' && secrets.PIDP_DEPLOY_SSH_KEY != '' }}
    steps:
      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.PIDP_DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.PIDP_DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy pinned image on host
        env:
          DEPLOY_HOST: ${{ secrets.PIDP_DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.PIDP_DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.PIDP_DEPLOY_PATH }}
          IMAGE_REF: ${{ needs.build-and-push.outputs.image_ref }}
        run: |
          REMOTE_PATH="${DEPLOY_PATH:-\$HOME/Documents/arkavo-platform/PIdP}"
          ssh "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "cd '${REMOTE_PATH}' && bash scripts/deploy_pidp.sh '${IMAGE_REF}' '${REMOTE_PATH}'"
